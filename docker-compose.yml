version: "3.9"

services:
  backend:
    image: travel-site-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    container_name: travel-site-backend
    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:${BACKEND_PORT:-5007}

      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      MySql__ServerVersion: ${MYSQL_SERVER_VERSION:-8.0.36}

      Jwt__Secret: ${Jwt__Secret}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}

    ports:
      - "${BACKEND_PORT:-5007}:${BACKEND_PORT:-5007}"

    volumes:
      - backend-wwwroot:/app/wwwroot

    deploy:
      resources:
        limits:
          memory: 800M

  frontend:
    image: travel-site-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://3.108.72.102:5007}

    container_name: travel-site-frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-5000}:5000"

    depends_on:
      - backend

    deploy:
      resources:
        limits:
          memory: 300M

volumes:
  backend-wwwroot: