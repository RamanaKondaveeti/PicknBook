services:
  backend:
    image: travel-site-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    container_name: travel-site-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "http://+:${BACKEND_PORT:-5007}"
      ConnectionStrings__DefaultConnection: "${ConnectionStrings__DefaultConnection:?Set ConnectionStrings__DefaultConnection in .env to your MySQL connection string}"
      MySql__ServerVersion: "${MYSQL_SERVER_VERSION:-8.0.36}"
      Cors__AllowedOrigins__0: "${PUBLIC_FRONTEND_URL:-http://3.108.72.102:5000}"
      Cors__AllowedOrigins__1: "http://localhost:${FRONTEND_PORT:-5000}"
      Cors__AllowedOrigins__2: "http://127.0.0.1:${FRONTEND_PORT:-5000}"
      Jwt__Secret: "${Jwt__Secret}"
      Jwt__Issuer: "${Jwt__Issuer}"
      Jwt__Audience: "${Jwt__Audience}"
      EmailSettings__SmtpServer: "${EmailSettings__SmtpServer}"
      EmailSettings__Port: "${EmailSettings__Port}"
      EmailSettings__Username: "${EmailSettings__Username}"
      EmailSettings__Password: "${EmailSettings__Password}"
    ports:
      - "${BACKEND_PORT:-5007}:${BACKEND_PORT:-5007}"
    volumes:
      - backend-wwwroot:/app/wwwroot

  frontend:
    image: travel-site-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: "${REACT_APP_API_BASE_URL:-http://3.108.72.102:5007}"
    container_name: travel-site-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5000}:5000"
    depends_on:
      - backend

volumes:
  backend-wwwroot:
