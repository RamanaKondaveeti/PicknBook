services:
  backend:
    build:
      context: ./backend
    container_name: travel-site-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5007"
      ConnectionStrings__DefaultConnection: "${MYSQL_CONNECTION_STRING:?Set MYSQL_CONNECTION_STRING in .env to your MySQL connection string}"
      MySql__ServerVersion: "8.0.36"
      Cors__AllowedOrigins__0: "http://3.108.72.102:5000"
      Cors__AllowedOrigins__1: "http://localhost:5000"
      Cors__AllowedOrigins__2: "http://127.0.0.1:5000"
    ports:
      - "5007:5007"
    volumes:
      - backend-wwwroot:/app/wwwroot

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: "http://3.108.72.102:5007"
    container_name: travel-site-frontend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - backend

volumes:
  backend-wwwroot:
